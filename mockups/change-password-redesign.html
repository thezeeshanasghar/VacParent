<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password — Redesign Mockup</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .toolbar { margin-bottom: 4px; }

  .cp-hero {
    text-align: center;
    padding: 12px 0 4px;
  }
  .cp-icon-wrap {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--primary-tint);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
    font-size: 32px;
    color: var(--primary);
  }
  .cp-title { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
  .cp-sub { font-size: 13px; color: var(--text-secondary); }

  .cp-card {
    background: var(--surface);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow);
    padding: 24px 20px 28px;
  }

  .cp-field { margin-bottom: 16px; }
  .cp-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .cp-input-wrap {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 0 8px 0 12px;
    min-height: 52px;
  }
  .cp-input-wrap.focused {
    border-color: var(--primary);
    background: var(--primary-tint);
  }
  .cp-icon { font-size: 1.25rem; color: var(--primary); flex-shrink: 0; margin-right: 10px; }
  .cp-input-wrap input {
    border: none;
    background: transparent;
    flex: 1;
    font-size: 15px;
    color: var(--text-primary);
    outline: none;
  }
  .eye { color: #94a0b8; padding: 0 4px; }
</style>
</head>
<body>

  <div class="device">
    <div class="screen">

      <div class="statusbar">
        <span>9:41</span>
        <span>●●●●● 5G 100%</span>
      </div>

      <div class="toolbar">
        <span class="back">←</span>
        <span class="title">Change Password</span>
      </div>

      <div class="content tight">

        <div class="cp-hero">
          <div class="cp-icon-wrap">🔒</div>
          <div class="cp-title">Update Your Password</div>
          <div class="cp-sub">Choose a strong password to protect your account</div>
        </div>

        <div class="cp-card">

          <div class="cp-field">
            <label class="cp-label">Current Password</label>
            <div class="cp-input-wrap">
              <span class="cp-icon">🔑</span>
              <input type="password" placeholder="Enter current password" value="••••••••">
              <span class="eye">👁️</span>
            </div>
          </div>

          <div class="cp-field">
            <label class="cp-label">New Password</label>
            <div class="cp-input-wrap focused">
              <span class="cp-icon">🔒</span>
              <input type="password" placeholder="Enter new password" value="•••••••••••">
              <span class="eye">👁️</span>
            </div>
          </div>

          <div class="cp-field">
            <label class="cp-label">Confirm New Password</label>
            <div class="cp-input-wrap">
              <span class="cp-icon">🔒</span>
              <input type="password" placeholder="Re-enter new password">
              <span class="eye">👁️</span>
            </div>
          </div>

          <button class="btn-orange" style="width:100%; margin-top: 6px;">Update Password</button>

        </div>

      </div>
    </div>
  </div>

</body>
</html>
