<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Patients</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div *ngIf="!childs" class="loading-state">
    <ion-spinner name="crescent" color="primary"></ion-spinner>
  </div>

  <div *ngIf="childs && childs.length === 0" class="empty-state">
    <ion-icon name="people-outline" aria-hidden="true"></ion-icon>
    <p>No patients found</p>
  </div>

  <div *ngFor="let child of childs"
       class="patient-card"
       [ngClass]="child.Gender=='Girl' ? 'card-girl' : 'card-boy'">

    <div class="patient-header">
      <div class="avatar-wrap" [ngClass]="child.Gender=='Girl' ? 'avatar-girl' : 'avatar-boy'">
        <ion-img [src]="child.Gender=='Girl' ? '../../assets/female.png' : '../../assets/male.png'"
                 class="patient-avatar"></ion-img>
      </div>
      <div class="patient-info">
        <h2 class="patient-name">{{child.Name}}</h2>
        <p class="patient-age">{{calculateAge(child.DOB)}} years old</p>
        <span class="gender-badge" [ngClass]="child.Gender=='Girl' ? 'badge-girl' : 'badge-boy'">
          <ion-icon [name]="child.Gender=='Girl' ? 'female-outline' : 'male-outline'" aria-hidden="true"></ion-icon>
          {{child.Gender}}
        </span>
      </div>
    </div>

    <div class="patient-footer">
      <div class="action-row">
        <ion-button class="vaccine-btn" routerLink="vaccine/{{child.Id}}">
          <ion-icon name="medkit-outline" slot="start"></ion-icon>
          Vaccines
        </ion-button>
        <ion-button class="followup-btn" routerLink="followup/{{child.Id}}">
          <ion-icon name="calendar-outline" slot="start"></ion-icon>
          Follow Up
        </ion-button>
      </div>
    </div>

  </div>

</ion-content>
