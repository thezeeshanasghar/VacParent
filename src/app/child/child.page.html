<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Patients</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div *ngFor="let child of childs" class="patient-card" [ngClass]="child.Gender=='Girl' ? 'card-girl' : 'card-boy'">

    <div class="patient-header">
      <div class="avatar-wrap" [ngClass]="child.Gender=='Girl' ? 'avatar-girl' : 'avatar-boy'">
        <ion-img [src]="child.Gender=='Girl' ? '../../assets/female.png' : '../../assets/male.png'"
                 class="patient-avatar"></ion-img>
      </div>
      <div class="patient-info">
        <h2 class="patient-name">{{child.Name}}</h2>
        <p class="patient-age">{{calculateAge(child.DOB)}} years old</p>
        <span class="gender-badge" [ngClass]="child.Gender=='Girl' ? 'badge-girl' : 'badge-boy'">
          <ion-icon [name]="child.Gender=='Girl' ? 'female-outline' : 'male-outline'"></ion-icon>
          {{child.Gender}}
        </span>
      </div>
    </div>

    <div class="patient-footer">
      <form [formGroup]="fg" class="doctor-row">
        <div class="doctor-select-wrap">
          <ion-icon name="person-circle-outline" class="doctor-icon"></ion-icon>
          <ion-input type="text" aria-label="Doctor" formControlName="DoctorDisplayName"
                     placeholder="Search doctor..." class="doctor-input"></ion-input>
          <ion-select formControlName="DoctorId" (ionChange)="onDoctorSelected($event.detail.value)"
                      interface="action-sheet" class="doctor-select">
            <ion-select-option *ngFor="let doctor of filteredDoctors" [value]="doctor">
              {{ doctor.DisplayName }}
            </ion-select-option>
          </ion-select>
        </div>
        <ion-button size="small" class="vaccine-btn" routerLink="vaccine/{{child.Id}}">
          <ion-icon name="medkit-outline" slot="start"></ion-icon>
          Vaccines
        </ion-button>
      </form>
    </div>

  </div>

</ion-content>
