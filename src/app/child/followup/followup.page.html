<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Follow Up</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div *ngIf="followups && followups.length === 0" class="empty-state">
    <ion-icon name="calendar-outline" class="empty-icon"></ion-icon>
    <p class="empty-text">No follow-up records found.</p>
  </div>

  <div *ngFor="let f of followups; let i = index" class="fu-card">
    <div class="fu-card-header">
      <span class="fu-serial">Visit #{{i + 1}}</span>
      <span class="fu-date">{{f.CurrentVisitDate | date:'dd MMM yyyy'}}</span>
    </div>

    <div class="fu-body">
      <div class="fu-row" *ngIf="f.Disease">
        <span class="fu-label">Reason / Disease</span>
        <span class="fu-value">{{f.Disease}}</span>
      </div>
      <div class="fu-row">
        <span class="fu-label">Next Visit</span>
        <span class="fu-value next-visit">{{f.NextVisitDate | date:'dd MMM yyyy'}}</span>
      </div>
      <div class="fu-metrics">
        <div class="fu-metric" *ngIf="f.Weight">
          <span class="metric-val">{{f.Weight}} kg</span>
          <span class="metric-lbl">Weight</span>
        </div>
        <div class="fu-metric" *ngIf="f.Height">
          <span class="metric-val">{{f.Height}} cm</span>
          <span class="metric-lbl">Height</span>
        </div>
        <div class="fu-metric" *ngIf="f.OFC">
          <span class="metric-val">{{f.OFC}} cm</span>
          <span class="metric-lbl">OFC</span>
        </div>
        <div class="fu-metric" *ngIf="f.BloodPressure">
          <span class="metric-val">{{f.BloodPressure}}</span>
          <span class="metric-lbl">BP</span>
        </div>
        <div class="fu-metric" *ngIf="f.BloodSugar">
          <span class="metric-val">{{f.BloodSugar}}</span>
          <span class="metric-lbl">Sugar</span>
        </div>
      </div>
    </div>
  </div>

</ion-content>
