<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <div class="toolbar-inner">
      <div class="toolbar-brand">
        <ion-icon name="medkit" class="toolbar-logo"></ion-icon>
        <span class="toolbar-title">Vaccine<span class="toolbar-pk">.PK</span></span>
      </div>
      <span class="toolbar-sub">Vaccination Centre</span>
    </div>
    <ion-buttons slot="end">
      <ion-button (click)="goToBookings()" class="bell-btn">
        <ion-icon name="notifications-outline" slot="icon-only"></ion-icon>
        <ion-badge *ngIf="bookingService.unreadCount > 0" color="danger" class="bell-badge">
          {{bookingService.unreadCount}}
        </ion-badge>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="dash-wrap">

    <div class="dash-greeting">
      <p class="dash-hello">Welcome back</p>
      <p class="dash-tagline">What would you like to do today?</p>
    </div>

    <div class="dash-grid">

      <div routerLink="/child" class="dash-card card-patients">
        <div class="dash-card-icon">
          <ion-icon name="people-outline"></ion-icon>
        </div>
        <span class="dash-card-label">My People</span>
        <span class="dash-card-sub">View your family records</span>
        <ion-icon name="chevron-forward-outline" class="dash-card-arrow"></ion-icon>
      </div>

      <div routerLink="/vaccines" class="dash-card card-vaccines">
        <div class="dash-card-icon">
          <ion-icon name="medkit-outline"></ion-icon>
        </div>
        <span class="dash-card-label">Vaccines</span>
        <span class="dash-card-sub">Browse schedule</span>
        <ion-icon name="chevron-forward-outline" class="dash-card-arrow"></ion-icon>
      </div>

      <div routerLink="/about" class="dash-card card-about">
        <div class="dash-card-icon">
          <ion-icon name="information-circle-outline"></ion-icon>
        </div>
        <span class="dash-card-label">About Us</span>
        <span class="dash-card-sub">Our mission</span>
        <ion-icon name="chevron-forward-outline" class="dash-card-arrow"></ion-icon>
      </div>

      <div routerLink="/bookings" class="dash-card card-bookings">
        <div class="dash-card-icon">
          <ion-icon name="calendar-outline"></ion-icon>
        </div>
        <span class="dash-card-label">My Bookings</span>
        <span class="dash-card-sub">View & track bookings</span>
        <ion-badge *ngIf="bookingService.unreadCount > 0" color="danger" class="card-notif-badge">
          {{bookingService.unreadCount}}
        </ion-badge>
        <ion-icon name="chevron-forward-outline" class="dash-card-arrow"></ion-icon>
      </div>

      <div class="dash-card card-logout" (click)="clearStorage()">
        <div class="dash-card-icon">
          <ion-icon name="log-out-outline"></ion-icon>
        </div>
        <span class="dash-card-label">Logout</span>
        <span class="dash-card-sub">Sign out safely</span>
        <ion-icon name="chevron-forward-outline" class="dash-card-arrow"></ion-icon>
      </div>

    </div>
  </div>
</ion-content>
