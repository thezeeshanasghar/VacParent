<ion-content>
  <div class="login-bg">
    <div class="blob blob-top-left"></div>
    <div class="blob blob-top-right"></div>
    <div class="blob blob-bottom"></div>

    <div class="login-overlay">

      <div class="brand-wrap">
        <div class="brand-icon">
          <div class="brand-icon-ring">
            <ion-icon name="medkit" class="brand-medkit"></ion-icon>
          </div>
        </div>
        <p class="brand-sub">Your child's health, our priority</p>
        <div class="brand-dots">
          <span class="dot dot-blue"></span>
          <span class="dot dot-green"></span>
          <span class="dot dot-orange"></span>
        </div>
      </div>

      <div class="login-card">
        <div class="card-header-bar">
          <span class="bar-segment bar-blue"></span>
          <span class="bar-segment bar-green"></span>
          <span class="bar-segment bar-orange"></span>
        </div>

        <h2 class="login-title">Welcome Back</h2>
        <p class="login-subtitle">Sign in to continue</p>

        <form [formGroup]="fg">

          <div class="input-group">
            <div class="input-icon">
              <ion-icon name="call-outline"></ion-icon>
            </div>
            <div class="input-body">
              <ion-select formControlName="CountryCode" class="country-select" interface="action-sheet">
                <ion-select-option *ngFor="let country of countryCodes" [value]="country.code">
                  +{{ country.code }}
                </ion-select-option>
              </ion-select>
              <div class="divider-v"></div>
              <ion-input
                class="phone-input"
                type="tel"
                inputmode="numeric"
                placeholder="Mobile Number"
                [clearInput]="true"
                formControlName="MobileNumber">
              </ion-input>
            </div>
          </div>
          <div *ngIf="fg.get('MobileNumber').invalid && (fg.get('MobileNumber').dirty || fg.get('MobileNumber').touched)" class="error-text">
            <ion-icon name="alert-circle-outline"></ion-icon>
            <span *ngIf="fg.get('MobileNumber').errors?.required">Mobile number is required.</span>
            <span *ngIf="fg.get('MobileNumber').errors?.onlyNumbers">Please enter only numbers.</span>
          </div>

          <div class="input-group">
            <div class="input-icon">
              <ion-icon name="lock-closed-outline"></ion-icon>
            </div>
            <div class="input-body">
              <ion-input
                class="text-input"
                [type]="showPassword ? 'text' : 'password'"
                placeholder="Password"
                autocomplete="current-password"
                formControlName="Password">
              </ion-input>
              <ion-button fill="clear" size="small" class="eye-btn" (click)="showPassword = !showPassword"
                          [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
                <ion-icon slot="icon-only" [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
              </ion-button>
            </div>
          </div>

          <ion-button expand="full" class="login-btn" [disabled]="isLoading" (click)="login()">
            <ion-spinner *ngIf="isLoading" name="crescent" slot="start"></ion-spinner>
            <ion-icon *ngIf="!isLoading" name="log-in-outline" slot="start"></ion-icon>
            {{ isLoading ? 'Signing in...' : 'Login' }}
          </ion-button>

          <div class="forgot-wrap">
            <ion-button fill="clear" routerLink="/forgotpassword" class="forgot-link">
              Forgot Password?
            </ion-button>
          </div>

        </form>
      </div>

      <p class="footer-note">Secure &amp; Encrypted &nbsp;•&nbsp; Pakistan</p>

    </div>
  </div>
</ion-content>
