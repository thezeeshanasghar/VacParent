<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Change Password</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="cp-hero">
    <div class="cp-icon-wrap">
      <ion-icon name="lock-closed-outline"></ion-icon>
    </div>
    <h2 class="cp-title">Update Your Password</h2>
    <p class="cp-sub">Choose a strong, secure password</p>
  </div>

  <div class="cp-card">
    <form [formGroup]="changePasswordForm" (ngSubmit)="changePassword()">

      <div class="cp-field">
        <p class="cp-label">Current Password</p>
        <div class="cp-input-wrap">
          <ion-icon name="lock-closed-outline" class="cp-icon"></ion-icon>
          <ion-input
            [type]="showOld ? 'text' : 'password'"
            formControlName="oldPassword"
            placeholder="Enter current password"
            autocomplete="current-password">
          </ion-input>
          <ion-button fill="clear" size="small" class="eye-btn" (click)="showOld = !showOld"
                      [attr.aria-label]="showOld ? 'Hide' : 'Show'">
            <ion-icon slot="icon-only" [name]="showOld ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </ion-button>
        </div>
        <p class="cp-error" *ngIf="changePasswordForm.get('oldPassword').invalid && changePasswordForm.get('oldPassword').touched">
          Current password is required.
        </p>
      </div>

      <div class="cp-field">
        <p class="cp-label">New Password</p>
        <div class="cp-input-wrap">
          <ion-icon name="key-outline" class="cp-icon"></ion-icon>
          <ion-input
            [type]="showNew ? 'text' : 'password'"
            formControlName="newPassword"
            placeholder="Enter new password"
            autocomplete="new-password">
          </ion-input>
          <ion-button fill="clear" size="small" class="eye-btn" (click)="showNew = !showNew"
                      [attr.aria-label]="showNew ? 'Hide' : 'Show'">
            <ion-icon slot="icon-only" [name]="showNew ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </ion-button>
        </div>
        <p class="cp-error" *ngIf="changePasswordForm.get('newPassword').invalid && changePasswordForm.get('newPassword').touched">
          New password is required.
        </p>
      </div>

      <div class="cp-field">
        <p class="cp-label">Confirm Password</p>
        <div class="cp-input-wrap">
          <ion-icon name="checkmark-circle-outline" class="cp-icon"></ion-icon>
          <ion-input
            [type]="showConfirm ? 'text' : 'password'"
            formControlName="confirmPassword"
            placeholder="Confirm new password"
            autocomplete="new-password">
          </ion-input>
          <ion-button fill="clear" size="small" class="eye-btn" (click)="showConfirm = !showConfirm"
                      [attr.aria-label]="showConfirm ? 'Hide' : 'Show'">
            <ion-icon slot="icon-only" [name]="showConfirm ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </ion-button>
        </div>
        <p class="cp-error" *ngIf="changePasswordForm.errors?.mismatch && changePasswordForm.get('confirmPassword').touched">
          Passwords do not match.
        </p>
      </div>

      <ion-button expand="full" type="submit"
                  [disabled]="changePasswordForm.invalid || isLoading"
                  class="cp-btn">
        <ion-spinner *ngIf="isLoading" name="crescent" slot="start"></ion-spinner>
        <ion-icon *ngIf="!isLoading" name="save-outline" slot="start"></ion-icon>
        {{ isLoading ? 'Saving...' : 'Save Password' }}
      </ion-button>

    </form>
  </div>

</ion-content>
