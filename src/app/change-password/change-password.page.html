<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>
    <ion-title>Change Password</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="cp-hero">
    <div class="cp-icon-wrap">
      <ion-icon name="lock-closed-outline"></ion-icon>
    </div>
    <h2 class="cp-title">Update Your Password</h2>
    <p class="cp-sub">Choose a strong, secure password</p>
  </div>

  <div class="cp-card">
    <form [formGroup]="changePasswordForm" (ngSubmit)="changePassword()">

      <div class="cp-field">
        <label class="cp-label">Current Password</label>
        <div class="cp-input-wrap">
          <ion-icon name="lock-closed-outline" class="cp-icon"></ion-icon>
          <ion-input type="password" formControlName="oldPassword" placeholder="Enter current password"></ion-input>
        </div>
      </div>

      <div class="cp-field">
        <label class="cp-label">New Password</label>
        <div class="cp-input-wrap">
          <ion-icon name="key-outline" class="cp-icon"></ion-icon>
          <ion-input type="password" formControlName="newPassword" placeholder="Enter new password"></ion-input>
        </div>
      </div>

      <div class="cp-field">
        <label class="cp-label">Confirm Password</label>
        <div class="cp-input-wrap">
          <ion-icon name="checkmark-circle-outline" class="cp-icon"></ion-icon>
          <ion-input type="password" formControlName="confirmPassword" placeholder="Confirm new password"></ion-input>
        </div>
      </div>

      <ion-button expand="full" type="submit" [disabled]="changePasswordForm.invalid" class="cp-btn">
        <ion-icon name="save-outline" slot="start"></ion-icon>
        Save Password
      </ion-button>

    </form>
  </div>

</ion-content>
