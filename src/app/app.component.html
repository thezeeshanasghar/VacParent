<ion-app>
  <ion-split-pane contentId="main-content" when="lg">
    <ion-menu contentId="main-content" type="overlay" *ngIf="loginservice.isAuthenticated()">
      <ion-content>
        <ion-list id="inbox-list">
          <ion-list-header>Navigation</ion-list-header>
          <ion-note>Parent Portal</ion-note>
          <ion-menu-toggle auto-hide="false" *ngFor="let p of appPages; let i = index">
            <ion-item (click)="selectedIndex = i" routerDirection="root" [routerLink]="[p.url]" lines="none" detail="false" [class.selected]="selectedIndex == i">
              <ion-icon slot="start" [ios]="p.icon + '-outline'" [md]="p.icon + '-sharp'"></ion-icon>
              <ion-label>{{ p.title }}</ion-label>
            </ion-item>
          </ion-menu-toggle>
          <ion-menu-toggle auto-hide="false">
            <ion-item routerLink="/bookings" lines="none">
              <ion-icon color="primary" slot="start" name="calendar-outline"></ion-icon>
              <ion-label>My Bookings</ion-label>
              <ion-badge *ngIf="bookingService.unreadCount > 0" color="danger" slot="end">{{bookingService.unreadCount}}</ion-badge>
            </ion-item>
          </ion-menu-toggle>
          <ion-menu-toggle auto-hide="false">
            <ion-item lines="none" (click)="clearStorage()" routerLink="/login" [button]="true">
              <ion-icon color="danger" slot="start" name="log-out-outline"></ion-icon>
              <ion-label color="danger">Logout</ion-label>
            </ion-item>
          </ion-menu-toggle>
        </ion-list>
      </ion-content>
    </ion-menu>
    <ion-router-outlet id="main-content"></ion-router-outlet>
  </ion-split-pane>
</ion-app>
